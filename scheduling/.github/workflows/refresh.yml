# ---------------------------------------------------------------------------
# GitHub Actions workflow - run the refresh in the cloud on a schedule.
#
# Use this if you want the refresh to run without your laptop being on. It runs
# fetch -> prepare -> load -> rebuild on GitHub's runners.
#
# To use:
#   1. Move this file to  .github/workflows/refresh.yml  at your repo root.
#   2. Add repository SECRETS (Settings > Secrets and variables > Actions):
#        SNOWFLAKE_ACCOUNT
#        SNOWFLAKE_USER              (the SVC_AI_LABOR_LOADER service user)
#        SNOWFLAKE_ROLE              (AI_LABOR_LOADER)
#        SNOWFLAKE_PRIVATE_KEY       (contents of rsa_key.p8 - the PRIVATE key)
#        SNOWFLAKE_PRIVATE_KEY_PASSPHRASE  (optional, if the key is encrypted)
#   3. Key-pair auth is REQUIRED here (no browser in CI). See sql/07.
#
# NOTE: this writes to Snowflake. Only enable it once you're comfortable with
#       automated writes to your account.
# ---------------------------------------------------------------------------
name: AI Labor Warehouse Refresh

on:
  schedule:
    # Every Monday 06:15 UTC. Cron in Actions is always UTC.
    - cron: "15 6 * * 1"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write private key from secret
        run: |
          mkdir -p ~/.snowflake
          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ~/.snowflake/rsa_key.p8
          chmod 600 ~/.snowflake/rsa_key.p8

      - name: Run refresh (fetch -> prepare -> load -> rebuild)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: AI_LABOR_WH
          SNOWFLAKE_DATABASE: AI_LABOR_ANALYTICS
          SNOWFLAKE_SCHEMA: RAW
          SNOWFLAKE_AUTHENTICATOR: snowflake_jwt
          SNOWFLAKE_PRIVATE_KEY_PATH: /home/runner/.snowflake/rsa_key.p8
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          python python/refresh_pipeline.py --load

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs
          path: logs/
          if-no-files-found: ignore
